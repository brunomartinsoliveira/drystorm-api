spring:
  application:
    name: drystorm-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:drystorm}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:seu-email@gmail.com}
    password: ${MAIL_PASSWORD:sua-senha-app}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  info:
    title: DryStorm API
    description: Sistema de Agendamento e Gestão de Serviços
    version: 1.0.0

app:
  jwt:
    secret: ${JWT_SECRET:drystorm-super-secret-key-change-in-production-2024}
    expiration-ms: ${JWT_EXPIRATION:86400000} # 24 horas
  mail:
    from: ${MAIL_FROM:noreply@drystorm.com.br}
    from-name: DryStorm — Roupas dryfit
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  business:
    opening-hour: 8
    closing-hour: 18
    slot-interval-minutes: 30
